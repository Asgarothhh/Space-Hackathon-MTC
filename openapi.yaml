  # ═══════════════════════════════════════════════════
  #  Agent
  # ═══════════════════════════════════════════════════
  /file_loader:
    post:
      operationId: uploadFile
      summary: Загрузить файл/архив проекта
      tags: [agent]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Файл загружен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileLoaderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: Файл слишком большой
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /ask:
    post:
      operationId: askAgent
      summary: Задать вопрос AI-агенту
      tags: [agent]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: []
              properties:
                user_message:
                  type: string
                expected_load:
                  type: string
                  enum: [low, medium, high, production]
                  default: medium
                project_root:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Ответ агента
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          description: Agent execution error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /health:
    get:
      operationId: healthCheck
      summary: Проверка здоровья агента
      tags: [agent]
      responses:
        "200":
          description: Статус здоровья
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
